<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFlux Cobot Command</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --primary: #00f3ff;
            --bg-color: #0b0f19;
            --danger: #ff003c;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a233a 0%, #0b0f19 100%);
            padding-top: 20px;
        }

        #status {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            z-index: 100;
            margin-bottom: 10px;
        }

        .dashboard {
            position: relative;
            width: 800px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #robot-canvas {
            position: absolute;
            width: 400px;
            height: 400px;
            z-index: 1;
            pointer-events: none;
        }

        .btn {
            position: absolute;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.7);
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        .btn:hover { transform: scale(1.1); }
        .btn:active { transform: scale(0.9); }

        .btn-home { top: 0%; border-color: #fff; }
        .btn-home:hover { background: #fff; color: black; box-shadow: 0 0 20px #fff; }

        .btn-lock { left: 5%; top: 40%; border-color: var(--danger); }
        .btn-lock:hover { background: var(--danger); box-shadow: 0 0 20px var(--danger); }

        .btn-unlock { right: 5%; top: 40%; border-color: #00ff66; }
        .btn-unlock:hover { background: #00ff66; color: black; box-shadow: 0 0 20px #00ff66; }

        .btn-red { bottom: 5%; left: 15%; border-color: #ff3333; }
        .btn-red:hover { background: #ff3333; box-shadow: 0 0 20px #ff3333; }

        .btn-stop { bottom: 5%; left: 50%; transform: translateX(-50%); border-color: yellow; color: yellow; }
        .btn-stop:hover { background: yellow; color: black; box-shadow: 0 0 20px yellow; transform: translateX(-50%) scale(1.1); }

        .btn-blue { bottom: 5%; right: 15%; border-color: #3388ff; }
        .btn-blue:hover { background: #3388ff; box-shadow: 0 0 20px #3388ff; }

        .camera-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            z-index: 10;
        }

        .cam-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .btn-feed {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary);
            background: transparent;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-feed:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        .btn-hide {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #888;
            background: transparent;
            border: 2px solid #888;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-hide:hover { background: #888; color: white; box-shadow: 0 0 15px #888; }

        .live-cam {
            width: 320px;
            height: 240px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            background: #111;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            display: none;
        }
    </style>
</head>
<body>

    <div id="status">CONNECTING TO COBOT...</div>

    <div class="dashboard">
        <div id="robot-canvas"></div>

        <button class="btn btn-home" onclick="sendCommand('HOME')">🏠 HOME</button>
        <button class="btn btn-lock" onclick="sendCommand('LOCK')">🔒 LOCK</button>
        <button class="btn btn-unlock" onclick="sendCommand('UNLOCK')">🔓 UNLOCK</button>

        <button class="btn btn-red" onclick="sendCommand('PICK RED')">🟥 PICK RED</button>
        <button class="btn btn-stop" onclick="sendCommand('STOP')">🛑 STOP</button>
        <button class="btn btn-blue" onclick="sendCommand('PICK BLUE')">🟦 PICK BLUE</button>
    </div>

    <div class="camera-section">
        <div class="cam-buttons">
            <button class="btn-feed" onclick="startCamera()">📷 SHOW LIVE FEED</button>
            <button class="btn-hide" onclick="stopCamera()">❌ STOP LIVE FEED</button>
        </div>
        <img id="cam-feed" class="live-cam" alt="Live Stream" />
    </div>

    <script>
        function startCamera() {
            const camImage = document.getElementById('cam-feed');
            camImage.src = "http://localhost:5000/video_feed";
            camImage.style.display = "block";
        }

        function stopCamera() {
            const camImage = document.getElementById('cam-feed');
            camImage.src = ""; // Kills the stream
            camImage.style.display = "none";
        }

        var ros = new ROSLIB.Ros({ url : 'ws://localhost:9090' });
        var statusText = document.getElementById('status');

        ros.on('connection', function() {
            statusText.innerText = '✅ SYSTEM ONLINE & CONNECTED';
            statusText.style.color = '#00ff66';
        });

        ros.on('error', function(error) {
            statusText.innerText = '❌ CONNECTION ERROR';
            statusText.style.color = '#ff3333';
        });

        var cmdTopic = new ROSLIB.Topic({
            ros : ros,
            name : '/web_arm_command',
            messageType : 'std_msgs/String'
        });

        function sendCommand(action) {
            var msg = new ROSLIB.Message({ data: action });
            cmdTopic.publish(msg);

            statusText.innerText = "EXECUTING: " + action;
            statusText.style.color = action === 'STOP' ? 'yellow' : '#fff';
            setTimeout(() => { statusText.style.color = "#00f3ff"; }, 1000);
        }

        // --- THREE.JS ROBOT RENDERING ---
        const container = document.getElementById('robot-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 2, 0);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(400, 400);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const silverMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.4 });
        const blueMat = new THREE.MeshStandardMaterial({ color: 0x66ccff, metalness: 0.3, roughness: 0.5 });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });

        const robot = new THREE.Group();
        const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.8, 1.5, 32), silverMat); 
        base.position.y = -2; 
        robot.add(base);
        
        const j1 = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 1.2, 32), blueMat); 
        j1.position.y = -0.6; 
        robot.add(j1);
        
        const link1 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 4, 32), silverMat); 
        link1.position.set(1.2, 1.2, 0); 
        link1.rotation.z = -Math.PI / 4; 
        robot.add(link1);
        
        const j2 = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 1.5, 32), blueMat); 
        j2.rotation.x = Math.PI / 2; 
        j2.position.set(2.6, 2.6, 0); 
        robot.add(j2);
        
        const link2 = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 3.5, 32), silverMat); 
        link2.position.set(3.5, 1.3, 0); 
        link2.rotation.z = Math.PI / 3; 
        robot.add(link2);
        
        const j3 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 1.2, 32), blueMat); 
        j3.rotation.x = Math.PI / 2; 
        j3.position.set(4.3, 0, 0); 
        robot.add(j3);
        
        const gripper = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.5, 32), blackMat); 
        gripper.position.set(4.8, -0.6, 0); 
        gripper.rotation.z = Math.PI / 6; 
        robot.add(gripper);
        
        scene.add(robot);

        function animate() {
            requestAnimationFrame(animate);
            robot.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
