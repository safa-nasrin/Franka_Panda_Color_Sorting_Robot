//This code excludes the digital twin and chatbot modules.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFlux Cobot Command - Cinematic 3D</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --primary: #00f3ff;
            --bg-color: #05080f;
            --danger: #ff003c;
        }

        /* ENABLED SMOOTH SCROLLING */
        html {
            scroll-behavior: smooth; 
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: auto; /* ALLOWS SCROLLING NOW */
        }

        /* --- BACKGROUND GRADIENT OVER ENTIRE SCROLLABLE AREA --- */
        #bg-gradient {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(circle at center, #0a1128 0%, #05080f 100%);
            z-index: -2;
        }

        /* --- THE CINEMATIC FLASH OVERLAY --- */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white;
            z-index: 999; pointer-events: none; animation: flashFade 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes flashFade { 0% { opacity: 1; } 100% { opacity: 0; display: none; } }

        /* --- THE 3D PARTICLE BACKGROUND (FIXED TO CAMERA) --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; 
        }

        /* =========================================
           PAGE 1: MAIN DASHBOARD SECTION
        ========================================= */
        .page-one {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centers it perfectly on the screen */
            padding: 40px 0;
            position: relative;
        }

        #status {
            font-size: 1.5rem; font-weight: bold; color: var(--primary); letter-spacing: 2px;
            z-index: 100; margin-bottom: 20px; text-shadow: 0 0 15px rgba(0, 243, 255, 0.8);
            opacity: 0; animation: fadeInText 2s forwards 1.5s;
        }
        @keyframes fadeInText { to { opacity: 1; } }

        /* DASHBOARD (MADE BIGGER: 900x700) */
        .dashboard {
            position: relative;
            width: 900px; 
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 40px rgba(0, 243, 255, 0.2);
            background: rgba(5, 8, 15, 0.6); 
            backdrop-filter: blur(4px);
            opacity: 0;
            animation: dropDownDash 2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.5s;
        }
        @keyframes dropDownDash {
            0% { opacity: 0; transform: scale(0.8) translateY(-100px); box-shadow: 0 0 0px rgba(0,243,255,0); }
            100% { opacity: 1; transform: scale(1) translateY(0); box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 40px rgba(0, 243, 255, 0.2); }
        }

        #robot-canvas { position: absolute; width: 900px; height: 700px; z-index: 1; }

        /* BUTTON ANIMATIONS */
        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-80px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(80px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpStop { 0% { opacity: 0; transform: translate(-50%, 50px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes dropDownHome { 0% { opacity: 0; transform: translate(-50%, -50px); } 100% { opacity: 1; transform: translate(-50%, 0); } }

        .btn {
            position: absolute; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; color: white;
            background: rgba(5, 8, 15, 0.9); border: 2px solid #555; border-radius: 8px; cursor: pointer;
            transition: 0.3s; z-index: 10; backdrop-filter: blur(5px); opacity: 0; 
        }
        .btn:hover { transform: scale(1.1); }
        .btn:active { transform: scale(0.9); }

        .btn-home { top: 5%; left: 50%; border-color: #fff; animation: dropDownHome 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.5s; }
        .btn-home:hover { background: #fff; color: black; box-shadow: 0 0 20px #fff; }

        .btn-lock { left: 5%; top: 40%; border-color: var(--danger); animation: slideInLeft 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.7s; }
        .btn-lock:hover { background: var(--danger); box-shadow: 0 0 20px var(--danger); }

        .btn-unlock { right: 5%; top: 40%; border-color: #00ff66; animation: slideInRight 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.7s; }
        .btn-unlock:hover { background: #00ff66; color: black; box-shadow: 0 0 20px #00ff66; }

        .btn-red { bottom: 5%; left: 15%; border-color: #ff3333; animation: slideUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.9s; }
        .btn-red:hover { background: #ff3333; box-shadow: 0 0 20px #ff3333; }

        .btn-stop { bottom: 5%; left: 50%; border-color: yellow; color: yellow; animation: slideUpStop 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.9s; }
        .btn-stop:hover { background: yellow; color: black; box-shadow: 0 0 20px yellow; transform: translateX(-50%) scale(1.1); }

        .btn-blue { bottom: 5%; right: 15%; border-color: #3388ff; animation: slideUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.9s; }
        .btn-blue:hover { background: #3388ff; box-shadow: 0 0 20px #3388ff; }

        /* Button DIRECTLY under the black box */
        .btn-scroll-down {
            margin-top: 30px; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; color: var(--primary);
            background: rgba(5, 8, 15, 0.9); border: 2px solid var(--primary); border-radius: 8px; cursor: pointer;
            transition: 0.3s; z-index: 10; backdrop-filter: blur(5px); opacity: 0;
            animation: slideUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 2.2s;
        }
        .btn-scroll-down:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); transform: scale(1.05); }


        /* =========================================
           PAGE 2: LIVE FEED SECTION (BELOW)
        ========================================= */
        .page-two {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* CENTERED PERFECTLY */
            justify-content: center; /* CENTERED PERFECTLY */
            padding: 40px 0; 
            position: relative;
        }

        .camera-buttons-container {
            display: flex;
            justify-content: center; /* CENTERED PERFECTLY */
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-feed-action, .btn-hide-action, .btn-scroll-up {
            padding: 15px 25px; font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.7); 
            border-radius: 8px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }
        
        .btn-feed-action { color: var(--primary); border: 2px solid var(--primary); }
        .btn-feed-action:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        .btn-hide-action { color: #888; border: 2px solid #888; }
        .btn-hide-action:hover { background: #888; color: white; box-shadow: 0 0 15px #888; }

        .btn-scroll-up { color: #fff; border: 2px solid #fff; } /* Margin removed for perfect symmetry */
        .btn-scroll-up:hover { background: #fff; color: black; box-shadow: 0 0 15px #fff; }

        .live-cam { 
            width: 640px; height: 480px; 
            border: 2px solid var(--primary); border-radius: 12px; 
            background: #111; box-shadow: 0 0 40px rgba(0, 243, 255, 0.2); 
            display: none; 
            z-index: 10;
        }

    </style>
</head>
<body>

    <div id="bg-gradient"></div>
    <div id="flash-overlay"></div>
    <div id="bg-canvas"></div>
    
    <div class="page-one" id="page-one">
        <div id="status">CONNECTING TO COBOT...</div>

        <div class="dashboard">
            <div id="robot-canvas"></div>
            
            <button class="btn btn-home" onclick="sendCommand('HOME')">🏠 HOME</button>
            <button class="btn btn-lock" onclick="sendCommand('LOCK')">🔒 LOCK</button>
            <button class="btn btn-unlock" onclick="sendCommand('UNLOCK')">🔓 UNLOCK</button>
            <button class="btn btn-red" onclick="sendCommand('PICK RED')">🟥 PICK RED</button>
            <button class="btn btn-stop" onclick="sendCommand('STOP')">🛑 STOP</button>
            <button class="btn btn-blue" onclick="sendCommand('PICK BLUE')">🟦 PICK BLUE</button>
        </div>

        <button class="btn-scroll-down" onclick="goToCameraPage()">⏬ GO TO LIVE FEED</button>
    </div>

    <div class="page-two" id="page-two">
        
        <div class="camera-buttons-container">
            <button class="btn-feed-action" onclick="startCamera()">📷 SHOW LIVE FEED</button>
            <button class="btn-hide-action" onclick="stopCamera()">❌ CLOSE LIVE FEED</button>
            <button class="btn-scroll-up" onclick="goToRobotPage()">⏫ BACK TO ROBOT</button>
        </div>

        <img id="cam-feed" class="live-cam" alt="Live Stream" />
    </div>

    <script>
        // --- SCROLLING LOGIC ---
        function goToCameraPage() {
            document.getElementById('page-two').scrollIntoView({ behavior: 'smooth' });
        }
        function goToRobotPage() {
            document.getElementById('page-one').scrollIntoView({ behavior: 'smooth' });
        }

        // --- CAMERA LOGIC ---
        function startCamera() { 
            document.getElementById('cam-feed').src = "http://localhost:5000/video_feed"; 
            document.getElementById('cam-feed').style.display = "block"; 
        }
        function stopCamera() { 
            document.getElementById('cam-feed').src = ""; 
            document.getElementById('cam-feed').style.display = "none"; 
        }

        // ====================================================================
        // --- 0. EPIC WARP SPEED 3D BACKGROUND (UNCHANGED) ---
        // ====================================================================
        const bgContainer = document.getElementById('bg-canvas');
        const bgScene = new THREE.Scene();
        bgScene.fog = new THREE.FogExp2(0x05080f, 0.02); 

        const bgCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        bgCamera.position.set(0, 5, 30);

        const bgRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        bgRenderer.setSize(window.innerWidth, window.innerHeight);
        bgContainer.appendChild(bgRenderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        const velocityArray = new Float32Array(particlesCount); 

        for(let i = 0; i < particlesCount * 3; i+=3) {
            posArray[i] = (Math.random() - 0.5) * 150; 
            posArray[i+1] = (Math.random() - 0.5) * 150; 
            posArray[i+2] = (Math.random() - 0.5) * 150; 
            velocityArray[i/3] = Math.random() * 0.2; 
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.2, color: 0x00f3ff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        bgScene.add(particlesMesh);

        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) - 0.5;
            mouseY = (event.clientY / window.innerHeight) - 0.5;
        });

        let warpSpeed = 3.0; 

        function animateBackground() {
            requestAnimationFrame(animateBackground);
            warpSpeed += (0.01 - warpSpeed) * 0.02;

            const positions = particlesMesh.geometry.attributes.position.array;
            for(let i = 2; i < particlesCount * 3; i+=3) {
                positions[i] += warpSpeed + velocityArray[(i-2)/3];
                if(positions[i] > 40) { 
                    positions[i] = -100;
                    positions[i-2] = (Math.random() - 0.5) * 150; 
                }
            }
            particlesMesh.geometry.attributes.position.needsUpdate = true;
            particlesMesh.rotation.z += 0.0005; 

            bgCamera.position.x += (mouseX * 10 - bgCamera.position.x) * 0.05;
            bgCamera.position.y += (-mouseY * 10 + 5 - bgCamera.position.y) * 0.05;
            bgCamera.lookAt(0, 5, 0);

            bgRenderer.render(bgScene, bgCamera);
        }
        animateBackground();

        window.addEventListener('resize', () => {
            bgRenderer.setSize(window.innerWidth, window.innerHeight);
            bgCamera.aspect = window.innerWidth / window.innerHeight;
            bgCamera.updateProjectionMatrix();
        });


        // ====================================================================
        // --- 1. ROS CONNECTION ---
        // ====================================================================
        var ros = new ROSLIB.Ros({ url : 'ws://localhost:9090' });
        var statusText = document.getElementById('status');
        ros.on('connection', function() { statusText.innerText = '✅ SYSTEM ONLINE'; statusText.style.color = '#00ff66'; });
        ros.on('error', function() { statusText.innerText = '❌ CONNECTION ERROR'; statusText.style.color = '#ff3333'; });

        var cmdTopic = new ROSLIB.Topic({ ros : ros, name : '/web_arm_command', messageType : 'std_msgs/String' });
        function sendCommand(action) {
            cmdTopic.publish(new ROSLIB.Message({ data: action }));
            statusText.innerText = "EXECUTING: " + action; statusText.style.color = action === 'STOP' ? 'yellow' : '#fff';
            setTimeout(() => { statusText.innerText = '✅ SYSTEM ONLINE'; statusText.style.color = "#00ff66"; }, 1000);
        }

        // ====================================================================
        // --- 2. FOREGROUND ROBOT WITH "POWER UP" ANIMATION (UNCHANGED) ---
        // ====================================================================
        const container = document.getElementById('robot-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 900/700, 0.1, 1000);
        camera.position.set(0, 10, 25); camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(900, 700);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2 + 0.1;

        let ambientLight = new THREE.AmbientLight(0xffffff, 0.0); 
        scene.add(ambientLight);
        let dirLight = new THREE.DirectionalLight(0xffffff, 0.0); 
        dirLight.position.set(10, 20, 10); dirLight.castShadow = true; 
        scene.add(dirLight);
        let fillLight = new THREE.PointLight(0x00f3ff, 0.0); 
        fillLight.position.set(-10, 5, -10); scene.add(fillLight);

        const silverMat = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.3, clearcoat: 0.2 });
        const blueMat = new THREE.MeshPhysicalMaterial({ color: 0x00aaff, metalness: 0.2, roughness: 0.1, clearcoat: 1.0 });
        const blackMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.5 });
        const floorMat = new THREE.MeshPhysicalMaterial({ color: 0x0b0f19, metalness: 0.8, roughness: 0.2, emissive: 0x000000 });

        const floor = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4.5, 0.5, 64), floorMat);
        floor.position.y = -5.0; floor.receiveShadow = true; scene.add(floor);

        const raycaster = new THREE.Raycaster(); const mouseRobot = new THREE.Vector2(); let isGlowing = false;
        renderer.domElement.addEventListener('pointerdown', (event) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouseRobot.x = ((event.clientX - rect.left) / rect.width) * 2 - 1; mouseRobot.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouseRobot, camera);
            if (raycaster.intersectObject(floor).length > 0) {
                isGlowing = !isGlowing;
                if(isGlowing) { ambientLight.intensity = 0.05; fillLight.intensity = 0.1; } 
                else { ambientLight.intensity = 0.4; fillLight.intensity = 0.5; floorMat.emissive.setHex(0x000000); }
            }
        });

        const robot = new THREE.Group(); robot.position.y = -2.5; 
        const base = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 2.0, 1.5, 32), silverMat); base.position.y = -1.75; base.castShadow = true; base.receiveShadow = true; robot.add(base);
        const j1 = new THREE.Group(); j1.position.y = -1.0; robot.add(j1);
        const j1Housing = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 1.2, 32), blueMat); j1Housing.castShadow = true; j1Housing.receiveShadow = true; j1.add(j1Housing);
        const link1 = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 2.5, 32), silverMat); link1.position.y = 1.85; link1.castShadow = true; link1.receiveShadow = true; j1.add(link1);
        const j2 = new THREE.Group(); j2.position.y = 3.1; j1.add(j2);
        const j2Housing = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2.0, 32), blueMat); j2Housing.rotation.z = Math.PI / 2; j2Housing.castShadow = true; j2Housing.receiveShadow = true; j2.add(j2Housing);
        const link2 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 4.5, 32), silverMat); link2.position.set(0, 2.25, 1.0); link2.castShadow = true; link2.receiveShadow = true; j2.add(link2);
        const j3 = new THREE.Group(); j3.position.set(0, 4.5, 1.0); j2.add(j3);
        const j3Housing = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 1.8, 32), blueMat); j3Housing.rotation.z = Math.PI / 2; j3Housing.position.z = -1.0; j3Housing.castShadow = true; j3Housing.receiveShadow = true; j3.add(j3Housing);
        const link3 = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 4.0, 32), silverMat); link3.position.set(0, 2.0, -1.0); link3.castShadow = true; link3.receiveShadow = true; j3.add(link3);
        const j4 = new THREE.Group(); j4.position.set(0, 4.0, -1.0); j3.add(j4);
        const j4Housing = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 1.6, 32), blueMat); j4Housing.rotation.z = Math.PI / 2; j4Housing.castShadow = true; j4Housing.receiveShadow = true; j4.add(j4Housing);
        const j5 = new THREE.Group(); j5.position.set(0, 1.0, 0); j4.add(j5);
        const j5Housing = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 1.4, 32), blueMat); j5Housing.rotation.x = Math.PI / 2; j5Housing.castShadow = true; j5Housing.receiveShadow = true; j5.add(j5Housing);
        const j6 = new THREE.Group(); j6.position.set(0, 0, 0.9); j5.add(j6);
        const j6Housing = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 1.0, 32), blueMat); j6Housing.rotation.x = Math.PI / 2; j6Housing.castShadow = true; j6Housing.receiveShadow = true; j6.add(j6Housing);
        const flange = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), blackMat); flange.rotation.x = Math.PI / 2; flange.position.z = 0.65; flange.castShadow = true; flange.receiveShadow = true; j6.add(flange);
        scene.add(robot);

        j2.rotation.x = Math.PI - 0.2; 
        j3.rotation.x = Math.PI - 0.2;
        j4.rotation.x = Math.PI / 2;
        
        const targetJ2 = 0.6;
        const targetJ3 = -1.2;
        const targetJ4 = -0.6;

        let bootProgress = 0.0;
        let bootDelay = 60; 

        var jointTopic = new ROSLIB.Topic({ ros : ros, name : '/joint_states', messageType : 'sensor_msgs/JointState' });
        jointTopic.subscribe(function(message) {
            if (bootProgress >= 1.0 && message.position && message.position.length >= 6) {
                j1.rotation.y = message.position[0]; 
                j2.rotation.x = message.position[1]; 
                j3.rotation.x = message.position[2]; 
                j4.rotation.x = message.position[3]; 
                j5.rotation.z = message.position[4]; 
                j6.rotation.y = message.position[5]; 
            }
        });

        function animateRobot() {
            requestAnimationFrame(animateRobot);
            robot.rotation.y += 0.005;

            if(bootDelay > 0) {
                bootDelay--;
            } else if (bootProgress < 1.0) {
                bootProgress += 0.008; 
                ambientLight.intensity = THREE.MathUtils.lerp(0, 0.4, bootProgress);
                dirLight.intensity = THREE.MathUtils.lerp(0, 1.2, bootProgress);
                fillLight.intensity = THREE.MathUtils.lerp(0, 0.5, bootProgress);
                let easeOut = 1 - Math.pow(1 - bootProgress, 3); 
                j2.rotation.x = THREE.MathUtils.lerp(Math.PI - 0.2, targetJ2, easeOut);
                j3.rotation.x = THREE.MathUtils.lerp(Math.PI - 0.2, targetJ3, easeOut);
                j4.rotation.x = THREE.MathUtils.lerp(Math.PI / 2, targetJ4, easeOut);
            }

            if (isGlowing && bootProgress >= 1.0) {
                const time = Date.now() * 0.003;
                const glowIntensity = Math.abs(Math.sin(time)) * 0.2;
                floorMat.emissive.setRGB(glowIntensity * 0.2, glowIntensity * 0.5, glowIntensity);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        animateRobot();
    </script>
</body>
</html>
