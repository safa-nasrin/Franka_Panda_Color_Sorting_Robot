<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFlux Cobot Command - Thick & True Twin</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --primary: #00f3ff;
            --bg-color: #05080f;
            --danger: #ff003c;
            /* Adjusted opacities for stronger background and softer glow */
            --red-hover: rgba(255, 51, 51, 0.7);
            --blue-hover: rgba(51, 136, 255, 0.7);
            --green-hover: rgba(0, 255, 102, 0.7);
            --yellow-hover: rgba(255, 255, 0, 0.6);
            --white-hover: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: Arial, sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; 
            background-image: radial-gradient(circle at center, #0a1128 0%, #05080f 100%);
            padding: 20px;
        }

        #status {
            font-size: 1.5rem; font-weight: bold; color: yellow;
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            margin-bottom: 20px; transition: 0.5s;
        }

        .dashboard {
            position: relative; width: 800px; height: 500px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 20px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,243,255,0.1);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 40px rgba(0, 243, 255, 0.2);
        }

        #robot-canvas { position: absolute; width: 800px; height: 500px; z-index: 1; }

        /* --- BUTTONS WITH UPDATED HOVER (STRONG BG, LIGHT GLOW) --- */
        .btn {
            position: absolute; padding: 12px 25px; font-size: 1rem; font-weight: bold; color: white;
            background: rgba(5, 8, 15, 0.85); border: 2px solid #555; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease-in-out; z-index: 10; backdrop-filter: blur(5px);
        }

        .btn-home { top: 5%; left: 50%; transform: translateX(-50%); border-color: #fff; }
        .btn-home:hover { background: var(--white-hover); box-shadow: 0 0 10px rgba(255, 255, 255, 0.3); transform: translateX(-50%) scale(1.05); }

        .btn-lock { left: 5%; top: 40%; border-color: var(--danger); color: var(--danger); }
        .btn-lock:hover { background: var(--red-hover); box-shadow: 0 0 12px var(--danger); transform: scale(1.08); color: white; }

        .btn-unlock { right: 5%; top: 40%; border-color: #00ff66; color: #00ff66; }
        .btn-unlock:hover { background: var(--green-hover); box-shadow: 0 0 12px #00ff66; transform: scale(1.08); color: white; }

        .btn-red { bottom: 5%; left: 15%; border-color: #ff3333; color: #ff3333; }
        .btn-red:hover { background: var(--red-hover); box-shadow: 0 0 12px #ff3333; transform: scale(1.08); color: white; }

        .btn-stop { bottom: 5%; left: 50%; transform: translateX(-50%); border-color: yellow; color: yellow; }
        .btn-stop:hover { background: var(--yellow-hover); box-shadow: 0 0 12px yellow; transform: translateX(-50%) scale(1.08); color: black; }

        .btn-blue { bottom: 5%; right: 15%; border-color: #3388ff; color: #3388ff; }
        .btn-blue:hover { background: var(--blue-hover); box-shadow: 0 0 12px #3388ff; transform: scale(1.08); color: white; }

        .camera-section { margin-top: 30px; display: flex; flex-direction: column; align-items: center; }
        .cam-buttons { display: flex; gap: 20px; margin-bottom: 15px; }
        
        .btn-cam { padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .start-btn { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .start-btn:hover { background: rgba(0, 243, 255, 0.3); box-shadow: 0 0 10px var(--primary); }
        
        .stop-btn { border: 2px solid #888; color: #888; background: transparent; }
        .stop-btn:hover { background: rgba(255, 255, 255, 0.2); }
        
        .live-cam { width: 480px; height: 360px; border: 2px solid var(--primary); border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="status">SEARCHING FOR COBOT SIGNAL...</div>

    <div class="dashboard">
        <div id="robot-canvas"></div>
        
        <button class="btn btn-home" onclick="sendCommand('HOME')">🏠 HOME</button>
        <button class="btn btn-lock" onclick="sendCommand('LOCK')">🔒 LOCK</button>
        <button class="btn btn-unlock" onclick="sendCommand('UNLOCK')">🔓 UNLOCK</button>
        <button class="btn btn-red" onclick="sendCommand('PICK RED')">🟥 PICK RED</button>
        <button class="btn btn-stop" onclick="sendCommand('STOP')">🛑 STOP</button>
        <button class="btn btn-blue" onclick="sendCommand('PICK BLUE')">🟦 PICK BLUE</button>
    </div>

    <div class="camera-section">
        <div class="cam-buttons">
            <button class="btn-cam start-btn" onclick="startCamera()">📷 START FEED</button>
            <button class="btn-cam stop-btn" onclick="stopCamera()">❌ STOP FEED</button>
        </div>
        <img id="cam-feed" class="live-cam" />
    </div>

    <script>
        // --- 1. ROS CONNECTION ---
        let isConnected = false;
        var ros = new ROSLIB.Ros({ url : 'ws://' + window.location.hostname + ':9090' });
        var statusText = document.getElementById('status');

        ros.on('connection', () => { 
            isConnected = true; statusText.innerText = '✅ SYSTEM ONLINE'; statusText.style.color = '#00ff66'; 
        });
        ros.on('error', () => { 
            isConnected = false; statusText.innerText = '❌ CONNECTION ERROR'; statusText.style.color = '#ff3333'; 
        });
        ros.on('close', () => { 
            isConnected = false; statusText.innerText = '❌ CONNECTION CLOSED'; statusText.style.color = '#ff3333'; 
        });

        var cmdTopic = new ROSLIB.Topic({ ros: ros, name: '/web_arm_command', messageType: 'std_msgs/String' });
        function sendCommand(action) { cmdTopic.publish(new ROSLIB.Message({ data: action })); }

        function startCamera() { document.getElementById('cam-feed').src = "http://" + window.location.hostname + ":5000/video_feed"; document.getElementById('cam-feed').style.display = "block"; }
        function stopCamera() { document.getElementById('cam-feed').style.display = "none"; document.getElementById('cam-feed').src = ""; }

        // --- 2. 3D SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 800/500, 0.1, 1000);
        camera.position.set(-20, 15, 45); 
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(800, 500); document.getElementById('robot-canvas').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.target.set(0, 5, 0); 

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(10, 20, 10); scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x00f3ff, 0.6); fillLight.position.set(-10, 5, -10); scene.add(fillLight);

        // Materials
        const silverMat = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.3, clearcoat: 0.2 });
        const blueMat = new THREE.MeshPhysicalMaterial({ color: 0x00aaff, metalness: 0.2, roughness: 0.1, clearcoat: 1.0 });
        const blackMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.5 });

        // Build Robot Group
        const robot = new THREE.Group(); robot.position.y = -10.0; scene.add(robot);

        // --- ROBOT GEOMETRY ---
        const staticBase = new THREE.Group(); robot.add(staticBase);
        const b1 = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 1.6, 32), silverMat); b1.position.y = 0.8; staticBase.add(b1);
        const b2 = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 1.8, 32), silverMat); b2.position.y = 2.5; staticBase.add(b2);
        const ring = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 1.5, 32), blueMat); ring.position.y = 4.15; staticBase.add(ring);
        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 3.5, 32), silverMat); pillar.position.y = 6.65; staticBase.add(pillar);

        const j1 = new THREE.Group(); j1.position.set(0, 8.4, 0); staticBase.add(j1);
        const j2 = new THREE.Group(); j1.add(j2);
        const j2P = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 1.6, 32), blueMat); j2P.rotation.z = Math.PI/2; j2.add(j2P);
        
        const l2V = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 4.5, 32), silverMat); l2V.position.set(1.35, 2.25, 0); j2.add(l2V);
        const l2H1 = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 1.35, 32), silverMat); l2H1.rotation.z = Math.PI/2; l2H1.position.set(0.675, 0, 0); j2.add(l2H1);
        const l2H2 = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 1.35, 32), silverMat); l2H2.rotation.z = Math.PI/2; l2H2.position.set(0.675, 4.5, 0); j2.add(l2H2);

        const j3 = new THREE.Group(); j3.position.set(1.35, 4.5, 0); j2.add(j3);
        const j3P = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 1.6, 32), blueMat); j3P.rotation.z = Math.PI/2; j3.add(j3P);
        const l3V = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 3.5, 32), silverMat); l3V.position.set(-1.35, 1.75, 0); j3.add(l3V);
        const l3H1 = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 1.35, 32), silverMat); l3H1.rotation.z = Math.PI/2; l3H1.position.set(-0.675, 0, 0); j3.add(l3H1);
        const l3H2 = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 1.35, 32), silverMat); l3H2.rotation.z = Math.PI/2; l3H2.position.set(-0.675, 3.5, 0); j3.add(l3H2);

        const j4 = new THREE.Group(); j4.position.set(-1.35, 3.5, 0); j3.add(j4);
        const j4P = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 1.6, 32), blueMat); j4P.rotation.z = Math.PI/2; j4.add(j4P);
        const l4V = new THREE.Mesh(new THREE.CylinderGeometry(1.25, 1.25, 3.0, 32), silverMat); l4V.position.set(1.35, 1.5, 0); j4.add(l4V);

        const j5 = new THREE.Group(); j5.position.set(1.35, 3.0, 0); j4.add(j5);
        const j5P = new THREE.Mesh(new THREE.CylinderGeometry(1.25, 1.25, 1.6, 32), blueMat); j5P.rotation.z = Math.PI/2; j5.add(j5P);
        const l5V = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2.0, 32), silverMat); l5V.position.set(-1.35, 1.0, 0); j5.add(l5V);
        const l5F = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 1.5, 32), silverMat); l5F.rotation.x = Math.PI/2; l5F.position.set(-1.35, 2.0, 0.75); j5.add(l5F);

        const j6 = new THREE.Group(); j6.position.set(-1.35, 2.0, 1.5); j5.add(j6);
        const j6P = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.8, 32), blueMat); j6P.rotation.x = Math.PI/2; j6P.position.set(0, 0, 0.4); j6.add(j6P);
        const flange = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.3, 32), blackMat); flange.rotation.x = Math.PI/2; flange.position.set(0, 0, 0.95); j6.add(flange);

        // ROS Sync
        var jointTopic = new ROSLIB.Topic({ ros: ros, name: '/joint_states', messageType: 'sensor_msgs/JointState' });
        jointTopic.subscribe((msg) => {
            if (isConnected && msg.position && msg.position.length >= 6) {
                j1.rotation.y = msg.position[0]; 
                j2.rotation.x = msg.position[1]; 
                j3.rotation.x = msg.position[2]; 
                j4.rotation.x = msg.position[3]; 
                j5.rotation.x = msg.position[4]; 
                j6.rotation.z = msg.position[5]; 
            }
        });

        function animate() { 
            requestAnimationFrame(animate); 
            if (!isConnected) { robot.rotation.y += 0.01; }
            else { robot.rotation.y += (0 - robot.rotation.y) * 0.1; }
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();
    </script>
</body>
</html>
